<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 英语助手 - 极速离线版</title>
    <link rel="manifest" href="manifest.json">
    
    <!-- 引入离线库 -->
    <script src="dict.js"></script>

    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; min-height: 100vh; }
        #input-area { width: 100%; max-width: 500px; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); box-sizing: border-box; }
        textarea { width: 100%; height: 120px; padding: 12px; border-radius: 12px; border: 1px solid #eee; font-size: 16px; box-sizing: border-box; background: #fafafa; outline: none; }
        
        /* 词库加载状态条 */
        #dict-status { font-size: 11px; color: #999; margin-bottom: 5px; width: 100%; text-align: right; }
        
        .btn-group { margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { padding: 14px; cursor: pointer; border: none; border-radius: 12px; font-weight: bold; font-size: 15px; color: white; transition: 0.2s; }
        .btn-translate { background-color: #f39c12; }
        .btn-parse { background-color: #4a90e2; }
        .btn-save { background-color: #6f42c1; }
        .btn-listen { background-color: #34c759; }
        .btn-stop { background-color: #ff3b30; grid-column: span 2; }
        
        #status { margin: 10px 0; font-size: 14px; color: #f39c12; font-weight: bold; text-align: center; min-height: 20px; }
        #card-container { width: 100%; max-width: 340px; height: 380px; perspective: 1000px; margin-top: 10px; display: none; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.5s; transform-style: preserve-3d; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; background: white; border-radius: 25px; padding: 20px; box-sizing: border-box; box-shadow: 0 8px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #eee; }
        .card-back { transform: rotateY(180deg); overflow-y: auto; justify-content: flex-start; padding-top: 40px; }
        
        .word-title { font-size: 38px; font-weight: bold; color: #2c3e50; }
        .phonetic { color: #95a5a6; font-size: 18px; margin-top: 10px; min-height: 20px; }
        .meaning-text { font-size: 18px; color: #444; margin-top: 10px; text-align: center; }
        
        .nav-btns { display: none; margin-top: 15px; gap: 20px; align-items: center; }
        .nav-btns button { background: #95a5a6; width: 90px; padding: 10px; }
        
        #notebook-list { display: flex; overflow-x: auto; gap: 8px; padding: 10px 0; width: 100%; }
        .word-tag { flex: 0 0 auto; background: white; padding: 6px 12px; border-radius: 12px; font-size: 13px; color: #6f42c1; border: 1px solid #eee; }
    </style>
</head>
<body>

    <div id="input-area">
        <div id="dict-status">正在加载离线词库...</div>
        <textarea id="textInput" placeholder="输入单词 (如: love like)"></textarea>
        <div id="status"></div>
        <div class="btn-group">
            <button class="btn-translate" onclick="translateFullText()">智能翻译</button>
            <button class="btn-parse" onclick="processText()">制作明信片</button>
            <button class="btn-save" onclick="saveToNotebook()">存入生词本</button>
            <button class="btn-listen" id="listenBtn" onclick="startListening()">自动连读</button>
            <button class="btn-stop" onclick="stopListening()">停止播放</button>
        </div>
    </div>

    <div id="card-container">
        <div class="card" id="card" onclick="this.classList.toggle('is-flipped')">
            <div class="card-face card-front" id="card-front-ui">
                <div class="word-title" id="display-word">Word</div>
                <div id="display-phonetic" class="phonetic"></div>
                <div style="margin-top:40px; color:#ddd; font-size:12px;">点击翻转卡片</div>
            </div>
            <div class="card-face card-back" id="display-meanings-list"></div>
        </div>
    </div>

    <div class="nav-btns" id="nav-btns">
        <button onclick="prevCard()">上一个</button>
        <span id="card-count" style="font-weight:bold; color:#7f8c8d;">0/0</span>
        <button onclick="nextCard()">下一个</button>
    </div>

    <div id="notebook-area" style="width:100%; max-width:500px; margin-top:20px;">
        <div style="font-weight:bold; font-size:14px; padding:0 10px;">📚 我的生词本 <span onclick="clearAllNotebook()" style="float:right; color:#999; font-size:12px;">清空</span></div>
        <div id="notebook-list"></div>
    </div>

    <script>
        // 检测词库是否加载成功
        window.onload = () => {
            const ds = document.getElementById('dict-status');
            if (window.localDict) {
                ds.innerText = "✅ 离线词库已就绪";
                ds.style.color = "#34c759";
            } else {
                ds.innerText = "❌ 词库加载失败，请刷新";
                ds.style.color = "#ff3b30";
            }
            renderNotebook();
        };

        let wordsList = [];
        let currentIndex = 0;
        let isGlobalSpeaking = false;
        const synth = window.speechSynthesis;

        const posMap = { 'n': '名词', 'v': '动词', 'adj': '形容词', 'adv': '副词', 'prep': '介词', 'pron': '代词', 'conj': '连词' };

        function convertPos(p) {
            if(!p) return "单词";
            let k = p.toLowerCase().replace('.', '');
            return posMap[k] || p;
        }

        async function processText() {
            const rawText = document.getElementById('textInput').value.trim();
            if (!rawText) return;
            const status = document.getElementById('status');
            wordsList = [];

            const segments = rawText.split(/[,\n;，；]/).filter(s => s.trim() !== "");

            for (let seg of segments) {
                seg = seg.trim();
                const hasChinese = /[\u4e00-\u9fa5]/.test(seg);

                if (hasChinese) {
                    // 人工模式：直接秒出
                    const match = seg.match(/^([a-zA-Z\-]+)\s+([a-zA-Z]+\.?)\s+([\u4e00-\u9fa5\s]+)$/);
                    if (match) {
                        wordsList.push({ 
                            word: match[1], 
                            phonetic: window.localDict?.[match[1].toLowerCase()]?.p || "", 
                            items: [{ pos: convertPos(match[2]), meaning: match[3] }] 
                        });
                    }
                } else {
                    // 自动模式
                    const words = seg.match(/[a-zA-Z\-]+/g) || [];
                    for (let w of words) {
                        const lowW = w.toLowerCase();
                        if (window.localDict && window.localDict[lowW]) {
                            // 【核心改动】如果在离线库，直接Push，跳过后续所有联网代码
                            const d = window.localDict[lowW];
                            wordsList.push({ 
                                word: w, 
                                phonetic: d.p || "", 
                                items: [{ pos: convertPos(d.pos), meaning: d.m }] 
                            });
                        } else {
                            // 不在本地库，提示联网
                            status.innerText = `🔍 联网查询: ${w}...`;
                            await fetchAndAddWordOnline(w);
                        }
                    }
                }
            }

            if (wordsList.length > 0) {
                document.getElementById('card-container').style.display = 'block';
                document.getElementById('nav-btns').style.display = 'flex';
                showCard(0);
                status.innerText = `✅ 已制作 ${wordsList.length} 张卡片`;
            }
        }

        async function fetchAndAddWordOnline(word) {
            // 增加超时控制，防止死等
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 3500); 

            try {
                const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`, { signal: controller.signal });
                const data = await res.json();
                if (data[0]) {
                    const m = data[0].meanings[0];
                    // 简单的英文解释，不翻译了（为了快）
                    wordsList.push({ 
                        word: word, 
                        phonetic: data[0].phonetic || "", 
                        items: [{ pos: convertPos(m.partOfSpeech), meaning: m.definitions[0].definition.split('.')[0] }] 
                    });
                }
            } catch (e) {
                console.log("网络查询失败:", word);
            } finally {
                clearTimeout(timeoutId);
            }
        }

        function showCard(index) {
            currentIndex = index;
            const item = wordsList[index];
            document.getElementById('display-word').innerText = item.word;
            document.getElementById('display-phonetic').innerText = item.phonetic || "";
            const list = document.getElementById('display-meanings-list');
            list.innerHTML = "";
            item.items.forEach(it => {
                const div = document.createElement('div');
                div.innerHTML = `<div style="color:#0288d1;font-weight:bold;margin-bottom:5px;">[${it.pos}]</div><div class="meaning-text">${it.meaning}</div>`;
                list.appendChild(div);
            });
            document.getElementById('card-count').innerText = `${index + 1} / ${wordsList.length}`;
            document.getElementById('card').classList.remove('is-flipped');
        }

        function nextCard() { if(currentIndex < wordsList.length - 1) showCard(currentIndex + 1); }
        function prevCard() { if(currentIndex > 0) showCard(currentIndex - 1); }

        async function startListening() {
            if (wordsList.length === 0) return;
            isGlobalSpeaking = true;
            document.getElementById('card-front-ui').classList.add('playing-now');
            for (let i = currentIndex; i < wordsList.length; i++) {
                if (!isGlobalSpeaking) break;
                showCard(i);
                await speak(wordsList[i].word, 'en-US', 0.8);
                await sleep(500);
                await speak(wordsList[i].word.split('').join(', '), 'en-US', 0.4);
                for (let it of wordsList[i].items) {
                    await speak(`词性 ${it.pos}，意思 ${it.meaning}`, 'zh-CN', 0.9);
                }
                await sleep(1000);
            }
            stopListening();
        }

        function speak(text, lang, rate) {
            return new Promise(resolve => {
                const u = new SpeechSynthesisUtterance(text);
                u.lang = lang; u.rate = rate; u.onend = resolve; u.onerror = resolve;
                synth.speak(u);
            });
        }
        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
        function stopListening() { isGlobalSpeaking = false; synth.cancel(); document.getElementById('card-front-ui').classList.remove('playing-now'); }
        
        // 简化的翻译逻辑
        async function translateFullText() {
            const text = document.getElementById('textInput').value.trim();
            if (!text) return;
            document.getElementById('status').innerText = "⏳ 翻译中...";
            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=auto|zh-CN`);
                const data = await res.json();
                alert(data.responseData.translatedText);
            } catch(e) { alert("翻译网络异常"); }
            document.getElementById('status').innerText = "";
        }

        function saveToNotebook() {
            let n = JSON.parse(localStorage.getItem('myVocab')) || [];
            wordsList.forEach(w => { if(!n.some(x => x.word === w.word)) n.push(w); });
            localStorage.setItem('myVocab', JSON.stringify(n));
            renderNotebook();
        }
        function renderNotebook() {
            const n = JSON.parse(localStorage.getItem('myVocab')) || [];
            const list = document.getElementById('notebook-list');
            list.innerHTML = "";
            n.forEach((item, i) => {
                const tag = document.createElement('div');
                tag.className = 'word-tag';
                tag.innerHTML = `<span onclick="reviewWord(${i})">${item.word}</span><span style="margin-left:8px;color:#ccc" onclick="deleteWord(${i})">×</span>`;
                list.appendChild(tag);
            });
        }
        function reviewWord(i) {
            wordsList = JSON.parse(localStorage.getItem('myVocab'));
            document.getElementById('card-container').style.display = 'block';
            document.getElementById('nav-btns').style.display = 'flex';
            showCard(i);
        }
        function deleteWord(i) {
            let n = JSON.parse(localStorage.getItem('myVocab'));
            n.splice(i, 1); localStorage.setItem('myVocab', JSON.stringify(n));
            renderNotebook();
        }
        function clearAllNotebook() { if(confirm("清空？")) { localStorage.removeItem('myVocab'); renderNotebook(); } }
    </script>
</body>
</html>
