<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 英语助手</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4a90e2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; min-height: 100vh; }
        #input-area { width: 100%; max-width: 500px; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); box-sizing: border-box; }
        textarea { width: 100%; height: 120px; padding: 12px; border-radius: 12px; border: 1px solid #eee; font-size: 16px; box-sizing: border-box; background: #fafafa; outline: none; }
        .btn-group { margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { padding: 14px; cursor: pointer; border: none; border-radius: 12px; font-weight: bold; font-size: 15px; color: white; transition: 0.2s; }
        .btn-translate { background-color: #f39c12; }
        .btn-parse { background-color: #4a90e2; }
        .btn-save { background-color: #6f42c1; }
        .btn-listen { background-color: #34c759; }
        .btn-stop { background-color: #ff3b30; grid-column: span 2; }
        #full-translation-box { margin-top: 10px; padding: 12px; background: #fdf6ec; border-radius: 10px; font-size: 14px; display: none; border-left: 4px solid #f39c12; }
        
        /* 核心修复：确保卡片容器在手机上可见 */
        #card-container { width: 100%; max-width: 340px; height: 420px; perspective: 1000px; margin-top: 20px; display: none; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.5s; transform-style: preserve-3d; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; background: white; border-radius: 30px; padding: 20px; box-sizing: border-box; box-shadow: 0 8px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #eee; }
        .card-back { transform: rotateY(180deg); overflow-y: auto; justify-content: flex-start; }
        
        .word-title { font-size: 36px; font-weight: bold; color: #2c3e50; }
        .pos-badge { background: #e1f5fe; color: #0288d1; padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; margin-bottom: 5px; }
        .meaning-text { font-size: 17px; color: #444; text-align: center; }
        #status { margin-top: 15px; font-size: 14px; color: #f39c12; font-weight: bold; text-align: center; min-height: 20px; }
        #notebook-area { width: 100%; max-width: 500px; margin-top: 30px; padding-bottom: 50px; }
        #notebook-list { display: flex; overflow-x: auto; gap: 10px; padding: 10px 0; }
        .word-tag { flex: 0 0 auto; background: white; padding: 8px 15px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 14px; color: #6f42c1; border: 1px solid #eee; }
    </style>
</head>
<body>

    <div id="input-area">
        <textarea id="textInput" placeholder="1. 输单词：apple banana&#10;2. 带定义：apple n 苹果&#10;3. 输句子：智能翻译"></textarea>
        <div id="full-translation-box"></div>
        <div class="btn-group">
            <button class="btn-translate" onclick="translateFullText()">智能翻译</button>
            <button class="btn-parse" onclick="processText()">制作明信片</button>
            <button class="btn-save" onclick="saveToNotebook()">存入生词本</button>
            <button class="btn-listen" id="listenBtn" onclick="startListening()">开启自动播放</button>
            <button class="btn-stop" onclick="stopListening()">停止</button>
        </div>
    </div>

    <div id="status"></div>

    <div id="card-container">
        <div class="card" id="card" onclick="this.classList.toggle('is-flipped')">
            <div class="card-face card-front">
                <div class="word-title" id="display-word">Word</div>
                <div id="display-phonetic" style="color:#95a5a6"></div>
                <div style="margin-top:20px; color:#ccc; font-size:12px;">点击翻转</div>
            </div>
            <div class="card-face card-back" id="display-meanings-list"></div>
        </div>
    </div>

    <div id="notebook-area">
        <div style="font-weight:bold;">📚 我的生词本 <span onclick="clearAllNotebook()" style="float:right; color:#999; font-size:12px;">清空</span></div>
        <div id="notebook-list"></div>
    </div>

    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
        let wordsList = [];
        let currentIndex = 0;
        let isGlobalSpeaking = false;
        const synth = window.speechSynthesis;

        async function getTranslation(text) {
            const hasChinese = /[\u4e00-\u9fa5]/.test(text);
            const sl = hasChinese ? 'zh-CN' : 'en', tl = hasChinese ? 'en' : 'zh-CN';
            try {
                const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURIComponent(text)}`);
                const data = await res.json();
                return data[0][0][0];
            } catch (e) { return "翻译暂不可用"; }
        }

        async function translateFullText() {
            const text = document.getElementById('textInput').value.trim();
            if (!text) return;
            const box = document.getElementById('full-translation-box');
            box.style.display = "block"; box.innerText = "翻译中...";
            box.innerText = "结果：" + await getTranslation(text);
        }

        async function processText() {
            const rawText = document.getElementById('textInput').value.trim();
            if (!rawText) return;
            document.getElementById('status').innerText = "AI 正在联网识词...";
            wordsList = [];
            const segments = rawText.split(/[,\n;，；]/).filter(s => s.trim() !== "");

            for (let seg of segments) {
                const words = seg.match(/[a-zA-Z\-]+/g) || [];
                for (let w of words) {
                    if (w.length > 1 || w.toLowerCase()==='a' || w.toLowerCase()==='i') {
                        await fetchAndAddWord(w);
                    }
                }
            }
            if (wordsList.length > 0) {
                document.getElementById('card-container').style.display = 'block';
                showCard(0);
                document.getElementById('status').innerText = `已生成 ${wordsList.length} 张卡片`;
            } else {
                document.getElementById('status').innerText = "未能识别单词，请检查拼写";
            }
        }

        async function fetchAndAddWord(word) {
            try {
                const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                const data = await res.json();
                if (data[0]) {
                    let items = [];
                    for(let m of data[0].meanings.slice(0, 2)) {
                        const cn = await getTranslation(m.definitions[0].definition);
                        items.push({ pos: m.partOfSpeech, meaning: cn.split(/[，；。;]/)[0] });
                    }
                    wordsList.push({ word, phonetic: data[0].phonetic || "", items });
                }
            } catch (e) {}
        }

        function showCard(index) {
            currentIndex = index;
            const item = wordsList[index];
            document.getElementById('display-word').innerText = item.word;
            document.getElementById('display-phonetic').innerText = item.phonetic;
            const list = document.getElementById('display-meanings-list');
            list.innerHTML = "";
            item.items.forEach(it => {
                const div = document.createElement('div');
                div.innerHTML = `<span class="pos-badge">${it.pos}</span><div class="meaning-text">${it.meaning}</div>`;
                list.appendChild(div);
            });
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function saveToNotebook() {
            let n = JSON.parse(localStorage.getItem('myVocab')) || [];
            wordsList.forEach(w => { if(!n.some(x => x.word === w.word)) n.push(w); });
            localStorage.setItem('myVocab', JSON.stringify(n));
            renderNotebook();
            document.getElementById('status').innerText = "已存入生词本";
        }

        function renderNotebook() {
            const n = JSON.parse(localStorage.getItem('myVocab')) || [];
            const list = document.getElementById('notebook-list');
            list.innerHTML = "";
            n.forEach((item, i) => {
                const tag = document.createElement('div');
                tag.className = 'word-tag';
                tag.innerHTML = `<span onclick="reviewWord(${i})">${item.word}</span><span style="margin-left:8px;color:#ccc" onclick="deleteWord(${i})">×</span>`;
                list.appendChild(tag);
            });
        }

        function reviewWord(i) {
            wordsList = JSON.parse(localStorage.getItem('myVocab'));
            document.getElementById('card-container').style.display = 'block';
            showCard(i);
        }

        function deleteWord(i) {
            let n = JSON.parse(localStorage.getItem('myVocab'));
            n.splice(i, 1);
            localStorage.setItem('myVocab', JSON.stringify(n));
            renderNotebook();
        }

        function clearAllNotebook() { if(confirm("清空？")) { localStorage.removeItem('myVocab'); renderNotebook(); } }

        function stopListening() { isGlobalSpeaking = false; synth.cancel(); }

        async function startListening() {
            if (wordsList.length === 0) return;
            isGlobalSpeaking = true;
            // 手机端播放必须在点击事件内立即触发一次声音，否则会被系统拦截
            synth.speak(new SpeechSynthesisUtterance("")); 
            
            for (let i = currentIndex; i < wordsList.length; i++) {
                if (!isGlobalSpeaking) break;
                showCard(i);
                const item = wordsList[i];
                await speak(item.word, 'en-US', 0.8);
                await sleep(500);
                await speak(item.word.split('').join(', '), 'en-US', 0.4);
                for (let it of item.items) {
                    await speak(`词性 ${it.pos}，意思 ${it.meaning}`, 'zh-CN', 0.9);
                }
                await sleep(1000);
            }
            isGlobalSpeaking = false;
        }

        function speak(text, lang, rate) {
            return new Promise(resolve => {
                const u = new SpeechSynthesisUtterance(text);
                u.lang = lang; u.rate = rate; u.onend = resolve;
                synth.speak(u);
            });
        }
        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
        window.onload = () => renderNotebook();
    </script>
</body>
</html>
